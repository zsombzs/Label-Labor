<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Label Labor</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="shortcut icon" type="image/png" href="assets/icon.png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvg/dist/browser/canvg.min.js"></script>
  <link rel="stylesheet" href="ea.css" />
</head>
<body>
  <div class="cim-container">
    <h1 class="focim">Label Labor címkéi</h1>
  </div>
  <div class="main-container">
    <!-- Bal oldali oszlop -->
    <div class="left-panel">
      <div class="controls1">
        <button class="btn" id="sablonBtn">1. Sablon Excel letöltése</button>
      </div>
      <div class="controls2">
        <label for="excelFile" class="btn">2. Excel fájl feltöltése (.xlsm)</label>
        <input type="file" id="excelFile" accept=".xlsm">
      </div>
      <div class="controls3">
        <button class="btn" id="downloadBtn">3. PDF letöltése</button>
      </div>
      <div class="label-type">
        <label class="circle-radio">
          <input type="radio" name="labelType" value="A" checked>
          <span></span>piros logo 
        </label>
        <label class="circle-radio">
          <input type="radio" name="labelType" value="B">
          <span></span>kék logo
        </label>
      </div>
      <div class="downloading-bar">
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
    </div>
    </div>
    <!-- Jobb oldali oszlop -->
    <div class="right-panel">
      <div class="company-stats-container">
        <span class="company-stats-text">Generált címkék száma: <span class="company-stats-number" id="companyLabelCount">999</span></span>
      </div>
      <div class="alcim-container">
        <h2 class="alcim">Címke generátor 1.3.1</h2>
      </div>
      <div id="labels"></div>
    </div>
  </div>
  <script type="module" src="script.js"></script>
  <script>
    window.onload = function() {
      if (!sessionStorage.getItem("reloaded")) {
        sessionStorage.setItem("reloaded", "true");
        location.reload();
      }
    };
  </script>
</body>
</html>
