<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Label Labor</title>
  <link rel="icon" type="image/png" href="assets/icon.png">
  <link rel="shortcut icon" type="image/png" href="assets/icon.png">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvg/dist/browser/canvg.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="ea.css" />
</head>
<body>
  <div class="cim-container">
    <h1 class="focim">European Aerosols</h1>
  </div>
  <div class="main-container">
    <!-- Bal oldali oszlop -->
    <div class="left-panel">
      <div class="controls1">
        <div class="sablon-dropdown">
          <button class="btn sablon-trigger">1. Sablon Excel letöltése</button>
          <div class="sablon-menu">
            <button class="btn sablon-menu-btn" id="sablonBtnNew">ÚJ (.xlsx)</button>
            <button class="btn sablon-menu-btn" id="sablonBtnOld">RÉGI (.xlsm)</button>
          </div>
        </div>
      </div>
      <div class="controls2">
        <label for="excelFile" class="btn btn-with-info">
          <span class="upload-label-text">2. Excel fájl feltöltése (.xlsx, .xlsm)</span>
          <span class="info-tooltip-wrapper">
            <i data-lucide="info" class="info-icon icon-before-upload"></i>
            <i data-lucide="check-circle" class="info-icon icon-after-upload" style="display:none"></i>
            <span class="info-tooltip">Húzzon ide egy .xlsx fájlt a feltöltéshez</span>
          </span>
        </label>
        <input type="file" id="excelFile" accept=".xlsx,.xlsm">
      </div>
      <div class="controls3">
        <button class="btn" id="tablePreviewBtn">Adatok megtekintése<i data-lucide="search" class="preview-icon"></i></button>
      </div>
      <div class="controls4">
        <button class="btn" id="downloadBtn">3. PDF letöltése</button>
      </div>
      <div class="label-type">
        <label class="circle-radio">
          <input type="radio" name="labelType" value="A" checked>
          <span></span>EA címke
        </label>
        <label class="circle-radio">
          <input type="radio" name="labelType" value="B">
          <span></span>HG címke
        </label>
      </div>
      <div class="downloading-bar">
      <div id="progressContainer">
        <div id="progressBar"></div>
      </div>
    </div>
    </div>
    <!-- Jobb oldali oszlop -->
    <div class="right-panel">
      <div class="company-stats-container">
        <span class="company-stats-text">Generált címkék száma: <span class="company-stats-number" id="companyLabelCount">0</span></span>
      </div>
      <div class="alcim-container">
        <h2 class="alcim">Címke generátor 1.3.1</h2>
      </div>
      <div id="labels">
        <div class="labels-empty-state" id="labelsEmptyState">
          <p>Töltse fel az Excel fájlt a polccímkék megjelenítéséhez</p>
        </div>
      </div>
    </div>
  </div>
  <!-- Betöltési animáció -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
      <div class="spinner"></div>
      <div class="loading-text">Címkegenerálás folyamatban...</div>
      <div class="loading-subtext">Kérem várjon, a rendszer elemzi a termékadatokat</div>
    </div>
  </div>
  <!-- Validáció modal - az agent eredménye itt jelenik meg -->
  <div class="validation-overlay" id="validationOverlay">
    <div class="validation-modal">
      <h2>⚠️ Adatellenőrzés</h2>
      <div class="summary" id="validationSummary"></div>
      <div id="issuesList"></div>
      <div class="modal-buttons">
<button class="apply-btn" id="applyFixesBtn">✓ Javítások alkalmazása</button>
        <button class="skip-btn" id="skipValidationBtn">Kihagyás</button>
      </div>
    </div>
  </div>
  <!-- Adatok előnézete modal -->
  <div class="data-table-overlay" id="dataTableOverlay">
    <div class="data-table-modal">
      <div class="data-table-header">
        <h2>Adatok előnézete</h2>
        <button class="data-table-close-btn" id="dataTableCloseBtn">✕</button>
      </div>
      <div class="data-table-scroll">
        <table class="data-preview-table" id="dataPreviewTable">
          <thead id="dataTableHead"></thead>
          <tbody id="dataTableBody"></tbody>
        </table>
      </div>
      <div class="data-table-footer">
        <button class="data-table-save-btn" id="dataTableSaveBtn">Mentés és generálás</button>
      </div>
    </div>
  </div>
  <!-- Custom alert modal -->
  <div class="custom-alert-overlay" id="customAlertOverlay">
    <div class="custom-alert-modal">
      <div class="custom-alert-header">
        <span class="custom-alert-title" id="customAlertTitle">Figyelmeztetés</span>
        <button class="custom-alert-close" id="customAlertClose">✕</button>
      </div>
      <div class="custom-alert-message" id="customAlertMessage"></div>
      <div class="custom-alert-footer">
        <button class="custom-alert-ok" id="customAlertOk">Bezárás</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      const infoWrapper = document.querySelector('.info-tooltip-wrapper');
      const leftPanel = document.querySelector('.left-panel');
      if (infoWrapper && leftPanel) {
        infoWrapper.addEventListener('mouseenter', () => leftPanel.classList.add('drag-over'));
        infoWrapper.addEventListener('mouseleave', () => leftPanel.classList.remove('drag-over'));
      }
    });
  </script>
  <script>
    window.onload = function() {
      if (!sessionStorage.getItem("reloaded")) {
        sessionStorage.setItem("reloaded", "true");
        location.reload();
      }
    };
  </script>
</body>
</html>
